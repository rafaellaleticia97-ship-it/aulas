<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Produtos Notáveis — 9º Ano</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--panel:#0d1117;--card:#111827;--border:#1f2937;
  --soma:#34d399;--dif:#fb7185;--prod:#818cf8;--poly:#fbbf24;
  --text:#f1f5f9;--muted:#94a3b8;--dim:#475569;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* ── TYPOGRAPHY ── */
.math{font-family:'Fira Code',monospace}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.pulse-dot{animation:pulse 2s ease-in-out infinite}
.fade-in{animation:fadeIn .35s ease}
.slide-in{animation:slideIn .3s ease}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
#header{
  background:linear-gradient(135deg,#0c1a4a 0%,#0d1117 70%);
  border-bottom:1px solid #1a2d5a;
  padding:18px 24px;position:sticky;top:0;z-index:50;
}
.header-inner{max-width:940px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-logo{width:46px;height:46px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,#3b82f6,#818cf8);
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 4px 16px #3b82f644}
.header-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.header-sub{color:#93c5fd;font-size:10.5px;margin-top:2px;letter-spacing:.8px}
.header-badge{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}

/* ── MAIN ── */
#main{max-width:940px;margin:0 auto;padding:22px 16px;display:flex;flex-direction:column;gap:18px;flex:1}

/* ── TABS ── */
#tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.tab-btn{
  border-radius:10px;padding:8px 14px;font-size:12.5px;cursor:pointer;
  white-space:nowrap;transition:all .2s;font-family:'Outfit',sans-serif;
  font-weight:500;border:1.5px solid var(--border);background:var(--panel);color:var(--dim);
}
.tab-btn:hover{filter:brightness(1.25)}
.tab-btn.active{font-weight:700}
.tab-btn .check{margin-left:5px;opacity:.5;font-size:11px}

/* ── LESSON CARD ── */
#lesson-card{
  background:var(--panel);border-radius:20px;padding:26px;
  border:1px solid var(--border);
  box-shadow:0 16px 60px #00000055;
  transition:border-color .3s, box-shadow .3s;
}
.lesson-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:26px;
  padding-bottom:18px;border-bottom:1px solid var(--border)}
.lesson-icon{width:52px;height:52px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  border:1.5px solid transparent}
.lesson-formula{font-family:'Fira Code',monospace;font-size:14.5px;margin-top:4px}
.lesson-h2{font-size:20px;font-weight:800;color:var(--text);margin:0}
.lesson-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
#lesson-body{display:flex;flex-direction:column;gap:22px}

/* ── NAV ── */
#nav{display:flex;justify-content:space-between;align-items:center}
.nav-btn{
  background:transparent;border:1.5px solid var(--border);color:var(--muted);
  border-radius:12px;padding:11px 22px;font-size:14px;cursor:pointer;
  font-family:'Outfit',sans-serif;transition:all .2s;
}
.nav-btn:disabled{color:#252d3d;border-color:#1a1f2e;cursor:default}
.nav-btn.next-active{color:#fff;font-weight:700}
.nav-dots{display:flex;gap:6px}
.nav-dot{width:10px;height:10px;border-radius:50%;border:none;cursor:pointer;
  padding:0;transition:all .3s;background:#1e293b}
.nav-dot.active{transform:scale(1.3)}
.nav-dot.visited{background:#334155}

/* ── SHARED COMPONENTS ── */
.badge{
  display:inline-block;border-radius:6px;padding:2px 10px;
  font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  font-family:'Outfit',sans-serif;border:1px solid;
}
.formula-box{
  border-radius:14px;padding:14px 24px;text-align:center;
  font-family:'Fira Code',monospace;font-size:19px;font-weight:600;
  letter-spacing:.5px;margin-top:10px;border:2px solid;
}
.section-label{font-size:11px;letter-spacing:1.2px;color:var(--muted);
  font-family:'Outfit',sans-serif;margin-bottom:12px}

/* ── INFO BOX ── */
.info-box{border-radius:16px;padding:20px;border:1.5px solid}
.info-box p{font-size:15px;line-height:1.9;margin-top:12px;font-family:'Outfit',sans-serif;color:var(--text)}

/* ── GRID HELPERS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.flex-col{display:flex;flex-direction:column;gap:12px}

/* ── STEP BY STEP ── */
.steps-wrap{display:flex;flex-direction:column;gap:8px}
.step-card{
  border-radius:12px;padding:10px 16px;transition:all .25s;
  background:var(--card);border:1.5px solid var(--border);
}
.step-card.revealed{cursor:default}
.step-card.current{cursor:pointer}
.step-card.current:hover{transform:translateY(-1px)}
.step-card.locked{opacity:.35;cursor:default}
.step-label{font-size:10px;color:var(--dim);margin-bottom:4px;letter-spacing:1px}
.step-content{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.step-eq{font-family:'Fira Code',monospace;font-size:14px}
.step-note{font-size:12px;color:var(--muted)}
.step-cta{color:var(--dim);font-size:13px}
.step-lock{color:#252d3d;font-size:18px}
.step-reset-btn{
  background:transparent;border-radius:8px;padding:6px 16px;
  cursor:pointer;font-size:13px;margin-top:4px;font-family:'Outfit',sans-serif;
  transition:all .2s;border:1px solid;
}

/* ── GEO SVG ── */
.geo-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.geo-tooltip{min-height:36px;display:flex;align-items:center;justify-content:center}
.geo-tooltip-box{
  border-radius:8px;padding:6px 18px;font-size:13px;
  font-family:'Outfit',sans-serif;text-align:center;border:1px solid;
}
.geo-hint{color:var(--dim);font-size:12px;font-family:'Outfit',sans-serif}
.geo-legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.geo-legend-item{display:flex;align-items:center;gap:6px;
  font-size:12px;font-family:'Fira Code',monospace;color:var(--muted)}
.geo-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.geo-area-label{
  border-radius:10px;padding:10px 14px;margin-top:10px;
  font-family:'Fira Code',monospace;font-size:12px;text-align:center;
}

/* ── POLY ── */
.anatomy-expr{display:flex;justify-content:center;align-items:center;gap:2px;flex-wrap:wrap;margin-bottom:20px}
.anatomy-term{font-family:'Fira Code',monospace;font-size:28px;font-weight:600;cursor:help}
.anatomy-op{font-family:'Fira Code',monospace;font-size:28px;font-weight:600;color:var(--muted)}
.poly-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.poly-meta-item{border-radius:10px;padding:10px 14px;border:1px solid}
.poly-meta-label{font-size:11px;color:var(--dim);margin-bottom:4px}
.poly-meta-val{font-family:'Fira Code',monospace;font-size:13px}
.poly-types-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.poly-type-btn{
  border-radius:12px;padding:14px 16px;cursor:pointer;text-align:left;
  transition:all .2s;border:1.5px solid var(--border);background:#0d1117;
}
.poly-type-btn:hover{filter:brightness(1.1)}
.poly-type-expr{font-family:'Fira Code',monospace;font-size:16px;margin-bottom:6px;color:var(--text)}
.poly-type-label{color:var(--dim);font-size:12px}
.poly-info-box{border-radius:12px;padding:14px;border:1px solid;display:none}
.poly-info-box.visible{display:block}
.poly-info-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.poly-info-text{color:var(--muted);font-size:13px}
.not-poly-grid{display:flex;gap:10px;flex-wrap:wrap}
.not-poly-item{background:#2a0a0a;border:1px solid #7f1d1d;border-radius:10px;padding:8px 14px}
.not-poly-expr{font-family:'Fira Code',monospace;color:#fca5a5;font-size:15px}
.not-poly-reason{color:var(--dim);font-size:11px;margin-top:4px}

/* ── INTRO ── */
.compare-box{border-radius:12px;padding:14px}
.compare-label{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
.compare-code{font-family:'Fira Code',monospace;font-size:13px;line-height:2.1}
.case-card{border-radius:14px;padding:16px;text-align:center;border:1.5px solid}
.case-num{width:28px;height:28px;border-radius:50%;border:1.5px solid;
  font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.case-label{font-size:12px;font-weight:700;margin-bottom:8px}
.case-formula{font-family:'Fira Code',monospace;font-size:11px;line-height:1.8;color:var(--muted);white-space:pre-line}

/* ── SOMA / DIFF SHARED ── */
.example-card{background:#0a150d;border-radius:12px;padding:14px}
.example-title{font-family:'Fira Code',monospace;font-size:16px;font-weight:600;margin-bottom:8px}
.example-vars{font-size:12px;margin-bottom:8px;color:var(--muted)}
.example-steps{font-family:'Fira Code',monospace;font-size:12px;line-height:2;color:#86efac}
.example-result{margin-top:10px;border-radius:8px;padding:8px 12px;
  font-family:'Fira Code',monospace;font-size:13px;font-weight:600}

/* ── DIF compare ── */
.compare-row{border-radius:12px;padding:12px 18px;display:flex;
  justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.compare-divider{text-align:center;color:var(--dim);font-size:22px;margin:2px 0}

/* ── QUIZ ── */
.quiz-progress-wrap{display:flex;align-items:center;gap:12px}
.quiz-progress-bar{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--prod),var(--soma));border-radius:3px;transition:width .4s}
.quiz-counter{color:var(--muted);font-size:13px;white-space:nowrap}
.quiz-question-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:28px;text-align:center
}
.quiz-question-label{color:var(--dim);font-size:11px;letter-spacing:1px;margin-bottom:12px}
.quiz-question{font-family:'Fira Code',monospace;font-size:34px;color:var(--text);font-weight:600}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{
  border-radius:12px;padding:14px 16px;font-size:14px;cursor:pointer;
  transition:all .2s;font-family:'Fira Code',monospace;text-align:center;
  border:1.5px solid var(--border);background:var(--card);color:var(--muted);
}
.quiz-opt:hover:not(:disabled){filter:brightness(1.12)}
.quiz-opt:disabled{cursor:default}
.quiz-feedback{border-radius:12px;padding:14px;border:1px solid;display:none}
.quiz-feedback.visible{display:block}
.quiz-feedback-title{font-weight:700;margin-bottom:6px}
.quiz-feedback-hint{font-family:'Fira Code',monospace;font-size:13px;color:var(--muted)}
.quiz-actions{display:flex;gap:10px}
.quiz-hint-btn{
  flex:1;background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;
}
.quiz-next-btn{
  flex:1;color:#fff;border:none;border-radius:12px;padding:12px 20px;
  font-size:14px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;
  background:linear-gradient(135deg,var(--prod),#4f46e5);
  display:none;
}
.quiz-hint-box{
  background:#1a1500;border:1px dashed #fbbf24;border-radius:10px;
  padding:14px;color:#fcd34d;font-family:'Fira Code',monospace;font-size:13px;display:none;
}
.quiz-result{text-align:center;padding:32px 0;display:none}
.quiz-result-emoji{font-size:72px;margin-bottom:16px}
.quiz-result-score{font-size:36px;font-weight:800;color:var(--text);margin-bottom:8px}
.quiz-result-msg{font-size:16px;margin-bottom:6px}
.quiz-result-pct{color:var(--dim);font-size:14px;margin-bottom:32px}
.quiz-retry-btn{
  background:linear-gradient(135deg,var(--prod),#4f46e5);
  color:#fff;border:none;border-radius:12px;padding:14px 32px;
  font-size:15px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;
}
.quiz-main{display:flex;flex-direction:column;gap:18px}

/* ── CARD INNER ── */
.dark-card{border-radius:12px;padding:14px;background:#1a1a2e}
.dark-card-sm{border-radius:12px;padding:14px;background:#0d0f1e}
.examples-section{border-radius:14px;padding:18px;border:1px dashed}
.error-classic{border-radius:12px;padding:14px;border:1px solid}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="header-logo">📐</div>
      <div>
        <div class="header-title">Produtos Notáveis</div>
        <div class="header-sub">MATEMÁTICA · 9º ANO · EXPRESSÕES ALGÉBRICAS</div>
      </div>
    </div>
    <div class="header-badge">
      <div class="pulse-dot" style="width:8px;height:8px;border-radius:50%;background:var(--soma)"></div>
      <span id="progress-label">1/6 seções visitadas</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="tabs"></div>

  <div id="lesson-card">
    <div class="lesson-header" id="lesson-header">
      <div class="lesson-icon" id="lesson-icon"></div>
      <div style="flex:1">
        <div class="lesson-meta">
          <h2 class="lesson-h2" id="lesson-title"></h2>
          <span class="badge" id="lesson-badge"></span>
        </div>
        <div class="lesson-formula math" id="lesson-formula"></div>
      </div>
    </div>
    <div id="lesson-body"></div>
  </div>

  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Anterior</button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="nav-btn next-active" id="btn-next" onclick="navigate(1)">Próximo →</button>
  </div>
</div>
</div>

<script>
/* ══════════════════════════════════════════════
   DATA
══════════════════════════════════════════════ */
const C = {
  soma:'#34d399', dif:'#fb7185', prod:'#818cf8', poly:'#fbbf24',
  text:'#f1f5f9', muted:'#94a3b8', dim:'#475569',
  card:'#111827', border:'#1f2937'
};

const lessons = [
  {tag:'poly',  emoji:'🔤', title:'Relembrando: Polinômios',         formula:'',                           color:C.poly},
  {tag:'intro', emoji:'⭐', title:'O que são Produtos Notáveis?',     formula:'',                           color:C.prod},
  {tag:'soma',  emoji:'➕', title:'Quadrado da Soma',                  formula:'(a + b)² = a² + 2ab + b²',   color:C.soma},
  {tag:'dif',   emoji:'➖', title:'Quadrado da Diferença',             formula:'(a − b)² = a² − 2ab + b²',   color:C.dif},
  {tag:'sd',    emoji:'✖️', title:'Produto da Soma pela Diferença',   formula:'(a + b)·(a − b) = a² − b²',  color:C.prod},
  {tag:'quiz',  emoji:'🏋️', title:'Pratique!',                        formula:'',                           color:C.poly},
];

const quizData = [
  {q:'(x + 3)²',    opts:['x² + 6x + 9','x² + 3x + 9','x² + 9','x² + 6x + 6'], ans:0, tipo:'Quadrado da Soma',       hint:'a=x, b=3 → x² + 2·x·3 + 9 = x² + 6x + 9'},
  {q:'(2x − 5)²',   opts:['4x²−10x+25','4x²−20x+25','4x²+20x+25','2x²−20x+25'],ans:1, tipo:'Quadrado da Diferença',  hint:'a=2x, b=5 → (2x)²−2·2x·5+25 = 4x²−20x+25'},
  {q:'(x+7)(x−7)',  opts:['x²−49','x²+49','x²−14x+49','x²−7'],                   ans:0, tipo:'Soma × Diferença',     hint:'(a+b)(a−b)=a²−b² → x²−49'},
  {q:'(3a + 2b)²',  opts:['9a²+4b²','9a²+6ab+4b²','9a²+12ab+4b²','3a²+12ab+4b²'],ans:2,tipo:'Quadrado da Soma',       hint:'2·3a·2b=12ab. (3a)²=9a², (2b)²=4b²'},
  {q:'(4x − 1)²',   opts:['16x²−1','16x²−4x+1','16x²−8x+1','4x²−8x+1'],          ans:2, tipo:'Quadrado da Diferença',hint:'a=4x, b=1 → 16x²−2·4x·1+1 = 16x²−8x+1'},
];

let active = 0;
const visited = new Set([0]);

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function badge(text, color) {
  return `<span class="badge" style="color:${color};background:${color}20;border-color:${color}55">${text}</span>`;
}
function formulaBox(text, color) {
  return `<div class="formula-box math" style="color:${color};border-color:${color}50;background:${color}10">${text}</div>`;
}
function infoBox(content, color) {
  return `<div class="info-box" style="background:${color}0c;border-color:${color}44">${content}</div>`;
}
function sectionLabel(text) {
  return `<div class="section-label">${text}</div>`;
}

/* ── STEP BY STEP ── */
let stepStates = {}; // tag -> revealed count
function stepsHTML(steps, color, stateKey) {
  if (!(stateKey in stepStates)) stepStates[stateKey] = 0;
  const rev = stepStates[stateKey];
  let html = `<div class="steps-wrap" id="steps-${stateKey}">`;
  steps.forEach((s, i) => {
    const cls = i < rev ? 'revealed' : i === rev ? 'current' : 'locked';
    const bdr = i < rev ? `${color}60` : C.border;
    const bg  = i < rev ? `${color}12` : C.card;
    const opacity = i > rev ? 0.35 : 1;
    let inner = '';
    if (i < rev) {
      inner = `<div class="step-content"><span class="step-eq math" style="color:${color}">${s.eq}</span><span class="step-note">${s.note}</span></div>`;
    } else if (i === rev) {
      inner = `<div class="step-cta">👆 Clique para revelar</div>`;
    } else {
      inner = `<div class="step-lock">🔒</div>`;
    }
    const onclick = i === rev ? `onclick="revealStep('${stateKey}',${steps.length},'${color}')"` : '';
    html += `<div class="step-card ${cls}" ${onclick} style="border-color:${bdr};background:${bg};opacity:${opacity}">
      <div class="step-label">PASSO ${i+1}</div>${inner}</div>`;
  });
  if (rev === steps.length) {
    html += `<button class="step-reset-btn" style="color:${color};border-color:${color}" onclick="resetStep('${stateKey}')">↺ Recomeçar</button>`;
  }
  html += '</div>';
  return html;
}
function revealStep(key, total, color) {
  stepStates[key] = Math.min((stepStates[key]||0)+1, total);
  renderLesson();
}
function resetStep(key) {
  stepStates[key] = 0;
  renderLesson();
}

/* ── GEOMETRIC SVG ── */
function geoSVG() {
  const W=200, aPx=130, bPx=70;
  const regions = [
    {id:'a2', x:0,   y:0,   w:aPx, h:aPx, fill:'#059669', label:'a²', desc:'Quadrado de lado a → área = a · a = a²'},
    {id:'ab1',x:aPx, y:0,   w:bPx, h:aPx, fill:'#34d399', label:'ab', desc:'Retângulo a × b → área = a · b = ab'},
    {id:'ab2',x:0,   y:aPx, w:aPx, h:bPx, fill:'#34d399', label:'ab', desc:'Retângulo b × a → área = b · a = ab'},
    {id:'b2', x:aPx, y:aPx, w:bPx, h:bPx, fill:'#6ee7b7', label:'b²', desc:'Quadrado de lado b → área = b · b = b²'},
  ];
  let rects = regions.map(r => `

      <line x1="0" y1="-10" x2="${aPx-2}" y2="-10" stroke="${C.soma}" stroke-width="1.5" opacity=".5"/>
      <line x1="${aPx+2}" y1="-10" x2="${W}" y2="-10" stroke="#86efac" stroke-width="1.5" opacity=".5"/>
      <text x="-20" y="${aPx/2}" text-anchor="middle" dominant-baseline="middle"
        font-size="16" fill="${C.soma}" font-family="'Fira Code',monospace" font-style="italic" font-weight="600">a</text>
      <text x="-20" y="${aPx+bPx/2}" text-anchor="middle" dominant-baseline="middle"
        font-size="16" fill="#86efac" font-family="'Fira Code',monospace" font-style="italic" font-weight="600">b</text>
      <line x1="-10" y1="0" x2="-10" y2="${aPx-2}" stroke="${C.soma}" stroke-width="1.5" opacity=".5"/>

      <div id="geo-tooltip-box" class="geo-tooltip-box" style="display:none;color:${C.soma};border-color:${C.soma}50;background:${C.soma}20"></div>
      <div id="geo-tooltip-hint" class="geo-hint">☝️ Passe o mouse sobre cada região para ver sua área</div>
    </div>
    <div class="geo-legend">
      ${[['#059669','a²'],['#34d399','ab (×2 = 2ab)'],['#6ee7b7','b²']].map(([c,l])=>
        `<div class="geo-legend-item"><div class="geo-legend-dot" style="background:${c}"></div>${l}</div>`).join('')}
    </div>
  </div>`;
}
function geoHover(id, desc) {
  const box  = document.getElementById('geo-tooltip-box');
  const hint = document.getElementById('geo-tooltip-hint');
  const regions = ['a2','ab1','ab2','b2'];
  const fills = {a2:'#059669',ab1:'#34d399',ab2:'#34d399',b2:'#6ee7b7'};
  regions.forEach(r => {
    const el = document.getElementById('geo-'+r);
    if (!el) return;
    el.setAttribute('opacity', (!id||r===id) ? '1' : '0.5');
    el.setAttribute('stroke', r===id ? '#fff' : '#07090f');
    el.setAttribute('stroke-width', r===id ? '2.5' : '1.5');
  });
  if (id && box && hint) {
    box.textContent = desc;
    box.style.display='block';
    hint.style.display='none';
  } else if (box && hint) {
    box.style.display='none';
    hint.style.display='block';
  }
}

function togglePolyType(i) {
  const c = C.poly;
  const prev = activePolyType;
  activePolyType = (prev===i) ? null : i;
  for(let j=0;j<4;j++){
    const btn = document.getElementById('ptype-'+j);

    if (!btn) continue;
    btn.style.background  = (activePolyType===j) ? `${c}1a` : '#0d1117';

  const infoEl  = document.getElementById('poly-info');

function renderDif() {
  const c = C.dif;
  const steps = [
    {eq:'(a − b)²',                              note:'queremos expandir'},
    {eq:'= (a − b) · (a − b)',                   note:'quadrado = multiplicar por si mesmo'},
    {eq:'= a·a + a·(−b) + (−b)·a + (−b)·(−b)', note:'distributiva completa'},
    {eq:'= a² − ab − ab + b²',                   note:'(−b)·(−b) = +b² ! negativo × negativo = positivo'},
    {eq:'= a² − 2ab + b²',                       note:'−ab + (−ab) = −2ab'},
  ];
  return `
  <div class="fade-in" style="display:flex;flex-direction:column;gap:22px">
    ${infoBox(`
      ${badge('Identidade', c)}
      <p>Quase igual ao quadrado da soma — a única diferença está no sinal do meio:

      ${formulaBox('(a − b)² = a² − 2ab + b²', c)}`, c)}

    <div style="background:${C.card};border:1px solid ${C.border};border-radius:14px;padding:18px">

function renderSD() {
  const c = C.prod;
  const steps = [
    {eq:'(a + b) · (a − b)',               note:'produto da soma pela diferença'},
    {eq:'= a·a + a·(−b) + b·a + b·(−b)', note:'distributiva'},
    {eq:'= a² − ab + ab − b²',             note:'observe os termos do meio...'},
    {eq:'= a² + 0 − b²',                   note:'−ab + ab = 0 → se cancelam!'},
    {eq:'= a² − b²',                       note:'sobra apenas a diferença dos quadrados'},
  ];
  return `
  <div class="fade-in" style="display:flex;flex-direction:column;gap:22px">
    ${infoBox(`
      ${badge('Identidade', c)}
      <p>Quando você multiplica a <strong style="color:${C.soma}">soma</strong> de dois termos pela sua
      <strong style="color:${C.dif}">diferença</strong>, os termos cruzados se
      <strong style="color:#fbbf24">cancelam magicamente</strong> e sobra apenas a diferença dos quadrados.
      É o produto notável mais elegante!</p>
      ${formulaBox('(a + b) · (a − b) = a² − b²', c)}`, c)}

    <div class="grid-2">
      <div>
        ${sectionLabel('👣 PASSO A PASSO')}
        ${stepsHTML(steps, c, 'sd')}
      </div>
      <div class="flex-col">

        <div class="dark-card-sm">
          <div style="color:${c};font-size:12px;font-weight:700;margin-bottom:10px">📝 Exemplos</div>
          ${[
            {ex:'(3x + 2y)(3x − 2y)', a:'3x', b:'2y', res:'9x² − 4y²'},

          ].map((e,i)=>`
            <div style="${i===0?'margin-bottom:12px':''}">

                <span style="color:${c};font-weight:600">= ${e.res}</span>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

      <div class="quiz-result-score">${s.score}/${quizData.length}</div>
      <div class="quiz-result-msg" style="color:${pct>=60?C.soma:C.dif}">
        ${pct===100?'Perfeito! Domínio total! 🎉':pct>=80?'Muito bem! Quase lá!':pct>=60?'Bom trabalho! Revise os que errou.':'Continue praticando!'}
      </div>
      <div class="quiz-result-pct">${pct}% de aproveitamento</div>
      <button class="quiz-retry-btn" onclick="quizReset()">🔄 Tentar novamente</button>
    </div>`;

  let optsHTML = '';
  q.opts.forEach((opt,i) => {
    let bg=C.card, border=C.border, color=C.muted;
    if (s.sel!==null) {
      if(i===q.ans)       {bg='#071d10';border=C.soma;color=C.soma;}
      else if(i===s.sel)  {bg='#1f0a0a';border=C.dif; color=C.dif; }
    }
    const prefix = s.sel!==null && i===q.ans ? '✅ ' : '';
    const suffix = s.sel!==null && i===s.sel && i!==q.ans ? ' ❌' : '';
    optsHTML += `<button class="quiz-opt" onclick="quizPick(${i})" ${s.sel!==null?'disabled':''}
      style="background:${bg};border-color:${border};color:${color}">${prefix}${opt}${suffix}</button>`;
  });

  const mainHTML = `
    <div class="quiz-main" id="quiz-main" style="${s.done?'display:none':'display:flex'}">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" style="width:${(s.cur/quizData.length)*100}%"></div>
        </div>
        <span class="quiz-counter">${s.cur+1} / ${quizData.length}</span>
      </div>
      <div>${badge(q.tipo, C.prod)}</div>
      <div class="quiz-question-box">
        <div class="quiz-question-label">CALCULE</div>
        <div class="quiz-question math">${q.q}</div>
      </div>
      <div class="quiz-options">${optsHTML}</div>
      <div class="quiz-feedback${s.sel!==null?' visible':''}" id="quiz-feedback"
        style="background:${correct?'#071d10':'#1f0a0a'};border-color:${correct?C.soma:C.dif};${s.sel!==null?'':'display:none'}">
        <div class="quiz-feedback-title" style="color:${correct?C.soma:C.dif}">
          ${correct?'🎉 Correto!':'😅 Não dessa vez...'}
        </div>
        <div class="quiz-feedback-hint">${q.hint}</div>
      </div>
      <div class="quiz-actions">
        <button class="quiz-hint-btn" id="quiz-hint-btn" onclick="quizToggleHint()"
          style="${s.sel!==null?'display:none':''}">
          💡 ${s.hintOpen?'Esconder dica':'Ver dica'}
        </button>
        <button class="quiz-next-btn" id="quiz-next-btn"
          style="${s.sel!==null?'display:block':'display:none'}"
          onclick="quizNext()">
          ${s.cur<quizData.length-1?'Próxima →':'Ver resultado 🏁'}
        </button>
      </div>
      <div class="quiz-hint-box" id="quiz-hint-box" style="${s.hintOpen&&s.sel===null?'display:block':'display:none'}">
        💡 ${q.hint}
      </div>
    </div>`;

  return `<div class="fade-in">${resultHTML}${mainHTML}</div>`;
}
function quizPick(i) {
  if (quizState.sel!==null) return;
  quizState.sel = i;
  if (i===quizData[quizState.cur].ans) quizState.score++;
  renderLesson();
}
function quizNext() {
  if (quizState.cur < quizData.length-1) {
    quizState.cur++; quizState.sel=null; quizState.hintOpen=false;
  } else { quizState.done=true; }
  renderLesson();
}
function quizReset() { quizState={cur:0,sel:null,score:0,done:false,hintOpen:false}; renderLesson(); }
function quizToggleHint() { quizState.hintOpen=!quizState.hintOpen; renderLesson(); }

/* ══════════════════════════════════════════════
   NAV & RENDER
══════════════════════════════════════════════ */
function navigate(dir) {
  const next = active + dir;
  if (next>=0 && next<lessons.length) goTo(next);
}
function goTo(i) {
  active = i;
  visited.add(i);
  renderAll();
}

function renderAll() {
  renderTabs();
  renderHeader();
  renderLesson();
  renderNav();
  renderProgressLabel();
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = lessons.map((l,i) => {
    const isActive = active===i;
    const isVisited = visited.has(i);
    const color = l.color;
    const bg    = isActive ? `${color}1a` : isVisited ? '#0d1117' : '#0d1117';
    const bc    = isActive ? color        : isVisited ? `${color}44` : '#1f2937';
    const tc    = isActive ? color        : isVisited ? `${color}aa` : '#475569';
    const fw    = isActive ? '700' : '500';
    const check = isVisited && !isActive ? '<span class="check">✓</span>' : '';
    return `<button class="tab-btn${isActive?' active':''}"
      onclick="goTo(${i})"
      style="background:${bg};border-color:${bc};color:${tc};font-weight:${fw}">
      ${l.emoji} ${l.title}${check}
    </button>`;
  }).join('');
}

function renderHeader() {
  const l = lessons[active];
  const card = document.getElementById('lesson-card');
  card.style.borderColor = l.color+'30';
  card.style.boxShadow = `0 0 40px ${l.color}12, 0 16px 60px #00000055`;

  const icon = document.getElementById('lesson-icon');
  icon.textContent = l.emoji;
  icon.style.background = `${l.color}18`;
  icon.style.borderColor = `${l.color}44`;

  document.getElementById('lesson-title').textContent = l.title;

  const badgeEl = document.getElementById('lesson-badge');
  badgeEl.textContent = `Seção ${active+1}`;
  badgeEl.style.color = l.color;
  badgeEl.style.background = `${l.color}20`;
  badgeEl.style.borderColor = `${l.color}55`;

  const fEl = document.getElementById('lesson-formula');
  fEl.textContent = l.formula || '';
  fEl.style.color = l.color;
}

function renderLesson() {
  renderHeader();
  const body = document.getElementById('lesson-body');
  const l = lessons[active];
  switch(l.tag) {
    case 'poly':  body.innerHTML = renderPoly();  break;
    case 'intro': body.innerHTML = renderIntro(); break;
    case 'soma':  body.innerHTML = renderSoma();  break;
    case 'dif':   body.innerHTML = renderDif();   break;
    case 'sd':    body.innerHTML = renderSD();    break;
    case 'quiz':  body.innerHTML = renderQuiz();  break;
  }
}

function renderNav() {
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  const l = lessons[active];

  prev.disabled = active===0;
  next.disabled = active===lessons.length-1;
  next.style.background = active===lessons.length-1 ? 'transparent' : `linear-gradient(135deg,${l.color},${l.color}bb)`;
  next.style.borderColor = active===lessons.length-1 ? '#1a1f2e' : l.color;
  next.style.color = active===lessons.length-1 ? '#252d3d' : '#fff';

  const dots = document.getElementById('nav-dots');
  dots.innerHTML = lessons.map((_,i) => {
    const isA = active===i, isV = visited.has(i);
    const bg = isA ? l.color : isV ? '#334155' : '#1e293b';
    return `<button class="nav-dot${isA?' active':''}${isV?' visited':''}"
      onclick="goTo(${i})" style="background:${bg}"></button>`;
  }).join('');
}

function renderProgressLabel() {
  document.getElementById('progress-label').textContent = `${visited.size}/${lessons.length} seções visitadas`;
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
